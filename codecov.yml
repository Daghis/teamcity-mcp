coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 80%

comment:
  layout: "reach,diff,flags,components,files"
  behavior: once
  require_changes: true
  hide_project_coverage: false

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        threshold: 2%
  individual_components:
    - component_id: tools
      name: MCP Tools
      paths:
        - src/tools/**
    - component_id: teamcity
      name: TeamCity Managers
      paths:
        - src/teamcity/**
    - component_id: utils
      name: Utilities
      paths:
        - src/utils/**
    - component_id: formatters
      name: Formatters
      paths:
        - src/formatters/**

ignore:
  - "src/teamcity-client/**"
  - "src/swagger/**"
  - "src/middleware/**"
  - "src/types/**"
  - "src/**/*.d.ts"
  - "src/index.ts"
  - "src/api-client.ts"
  - "tests/**"
